      <text x="29" y="43" fill="#fff" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="22" font-weight="900">!</text>
      <text x="58" y="31" fill="#0b1220" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="15" font-weight="800">Review</text>
      <text x="58" y="52" fill="#64748b" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="12">Approvals</text>
    </g>
    <g transform="translate(340 104)">
