      <circle cx="34" cy="36" r="16" fill="#2f7cff"/>
      <path d="M26 38h16M34 30v16" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <text x="58" y="31" fill="#0b1220" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="15" font-weight="800">Scoped</text>
      <text x="58" y="52" fill="#64748b" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="12">API keys</text>
    </g>

    <g transform="translate(28 210)" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif">
      <rect width="448" height="50" rx="13" fill="#f8fafc" stroke="#dbe6f7"/>
      <text x="18" y="31" fill="#0b1220" font-size="15" font-weight="800">Create page draft</text>
      <rect x="274" y="13" width="72" height="24" rx="12" fill="#ecfdf3"/>
      <text x="294" y="30" fill="#166534" font-size="12" font-weight="800">Low</text>
      <rect x="360" y="10" width="76" height="30" rx="9" fill="#2f7cff"/>
