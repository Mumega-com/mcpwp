      <rect width="448" height="50" rx="13" fill="#f8fafc" stroke="#dbe6f7"/>
      <text x="18" y="31" fill="#0b1220" font-size="15" font-weight="800">Optimize media alt text</text>
      <rect x="274" y="13" width="72" height="24" rx="12" fill="#fff7ed"/>
      <text x="286" y="30" fill="#9a3412" font-size="12" font-weight="800">Medium</text>
      <rect x="360" y="10" width="76" height="30" rx="9" fill="#2f7cff"/>
      <text x="380" y="30" fill="#fff" font-size="13" font-weight="800">Apply</text>
    </g>
