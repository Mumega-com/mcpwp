<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" width="1544" height="500" role="img" aria-labelledby="title desc">
  <title id="title">MCPWP WordPress plugin banner</title>
  <desc id="desc">MCPWP connects WordPress to AI agents with scoped keys, approvals, Elementor support, and SEO checks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101f"/>
      <stop offset="0.52" stop-color="#10264f"/>
      <stop offset="1" stop-color="#07101f"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="70%">
      <stop offset="0" stop-color="#2f7cff" stop-opacity="0.38"/>
      <stop offset="0.55" stop-color="#2f7cff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#2f7cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1544" height="500" fill="url(#bg)"/>
  <rect width="1544" height="500" fill="url(#glow)"/>

  <g opacity="0.09" stroke="#ffffff" stroke-width="1">
    <path d="M0 100h1544M0 200h1544M0 300h1544M0 400h1544"/>
    <path d="M160 0v500M320 0v500M480 0v500M640 0v500M800 0v500M960 0v500M1120 0v500M1280 0v500M1440 0v500"/>
  </g>

  <g transform="translate(126 118)">
    <rect width="116" height="116" rx="28" fill="#0b1220" stroke="#2f7cff" stroke-width="4" filter="url(#shadow)"/>
    <path d="M68 18 28 68h30l-8 48 42-58H64l4-40Z" fill="#ffffff"/>
    <circle cx="88" cy="86" r="16" fill="#20b86f"/>
    <circle cx="88" cy="86" r="7" fill="#0b1220"/>
  </g>

  <text x="126" y="282" fill="#ffffff" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="-2">MCPWP</text>
  <text x="126" y="338" fill="#dbeafe" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="30" font-weight="600">Safe AI operations for WordPress</text>
  <text x="126" y="386" fill="#94a3b8" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="22">Scoped access. Human approvals. Auditable changes.</text>

  <g transform="translate(126 420)" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">
    <rect width="116" height="34" rx="17" fill="#13294f" stroke="#2f7cff" stroke-opacity="0.45"/>
    <text x="20" y="23" fill="#dbeafe">Scoped keys</text>
    <g transform="translate(132 0)">
      <rect width="104" height="34" rx="17" fill="#10351f" stroke="#20b86f" stroke-opacity="0.45"/>
      <text x="20" y="23" fill="#dcfce7">Approvals</text>
    </g>
    <g transform="translate(252 0)">
      <rect width="112" height="34" rx="17" fill="#13294f" stroke="#2f7cff" stroke-opacity="0.45"/>
      <text x="20" y="23" fill="#dbeafe">Elementor</text>
    </g>
    <g transform="translate(380 0)">
      <rect width="104" height="34" rx="17" fill="#3a2708" stroke="#f59e0b" stroke-opacity="0.5"/>
