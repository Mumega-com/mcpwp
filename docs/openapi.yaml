openapi: 3.0.3
info:
  title: Mumega MCP
  description: |
    Control WordPress with AI through a powerful REST API.

    Mumega MCP provides a comprehensive API for managing WordPress sites,
    including content management, Elementor page building, SEO optimization,
    form management, and more.

    ## Authentication
    All endpoints require API key authentication via the `X-API-Key` header
    or `Authorization: Bearer` header.
  version: 1.0.4
  contact:
    name: Mumega
    url: https://sitepilotai.mumega.com
    email: support@mumega.com
  license:
    name: GPL v2
    url: https://www.gnu.org/licenses/gpl-2.0.html

servers:
  - url: https://{site}/wp-json/site-pilot-ai/v1
    description: WordPress Site
    variables:
      site:
        default: example.com
        description: Your WordPress domain

security:
  - ApiKeyAuth: []
  - BearerAuth: []

tags:
  - name: Site
    description: Site information and analytics
  - name: Posts
    description: Post management
  - name: Pages
    description: Page management
  - name: Media
    description: Media library management
  - name: Elementor
    description: Elementor page builder (Core)
  - name: Elementor Pro
    description: Advanced Elementor features (Paid)
  - name: SEO
    description: SEO management (Paid)
  - name: Forms
    description: Form plugin integration (Paid)
  - name: Users
    description: User management (Paid)
  - name: Menus
    description: Navigation menu management (Paid)
  - name: Settings
    description: Site settings (Paid)
  - name: Options
    description: Reading and front page options (Paid)
  - name: Favicon
    description: Site icon management (Pro)
  - name: Widgets
    description: Widget and sidebar management (Pro)
  - name: Themes
    description: Theme settings integration (Pro)
  - name: Theme Builder
    description: Elementor Theme Builder (Pro)

paths:
  /site-info:
    get:
      tags: [Site]
      summary: Get site information
      description: Returns WordPress site details and detected capabilities
      operationId: getSiteInfo
      responses:
        '200':
          description: Site information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /plugins:
    get:
      tags: [Site]
      summary: Detect installed plugins
      description: Returns detected plugins and site capabilities
      operationId: getPlugins
      responses:
        '200':
          description: Plugin detection results
          content:
            application/json:
              schema:
                type: object

  /analytics:
    get:
      tags: [Site]
      summary: Get site analytics
      description: Returns API usage analytics
      operationId: getAnalytics
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 365
      responses:
        '200':
          description: Analytics data

  /posts:
    get:
      tags: [Posts]
      summary: List posts
      description: Get all posts with pagination and filtering
      operationId: listPosts
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
        - name: status
          in: query
          schema:
            type: string
            default: publish
            enum: [publish, draft, pending, private, any]
        - name: category
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostList'
    post:
      tags: [Posts]
      summary: Create post
      description: Create a new WordPress post
      operationId: createPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreate'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'

  /posts/{id}:
    get:
      tags: [Posts]
      summary: Get post
      operationId: getPost
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Post details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Posts]
      summary: Update post
      operationId: updatePost
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdate'
      responses:
        '200':
          description: Post updated
    delete:
      tags: [Posts]
      summary: Delete post
      operationId: deletePost
      parameters:
        - $ref: '#/components/parameters/PostId'
        - name: force
          in: query
          schema:
            type: boolean
            default: false
          description: Bypass trash and permanently delete
      responses:
        '200':
          description: Post deleted

  /drafts:
    get:
      tags: [Posts]
      summary: List drafts
      description: Get all draft posts and pages
      operationId: listDrafts
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [post, page, all]
            default: all
      responses:
        '200':
          description: List of drafts

  /pages:
    get:
      tags: [Pages]
      summary: List pages
      operationId: listPages
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
        - name: status
          in: query
          schema:
            type: string
            default: any
        - name: parent
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of pages
    post:
      tags: [Pages]
      summary: Create page
      operationId: createPage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageCreate'
      responses:
        '201':
          description: Page created

  /pages/{id}:
    get:
      tags: [Pages]
      summary: Get page
      operationId: getPage
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Page details
    put:
      tags: [Pages]
      summary: Update page
      operationId: updatePage
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageUpdate'
      responses:
        '200':
          description: Page updated
    delete:
      tags: [Pages]
      summary: Delete page
      operationId: deletePage
      parameters:
        - $ref: '#/components/parameters/PostId'
        - name: force
          in: query
          schema:
            type: boolean
            default: false
          description: Bypass trash and permanently delete
      responses:
        '200':
          description: Page deleted

  /templates/page:
    get:
      tags: [Pages]
      summary: List page templates
      description: Get all available page templates
      operationId: listPageTemplates
      responses:
        '200':
          description: Available page templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      type: object
                      properties:
                        slug:
                          type: string
                        name:
                          type: string
                  total:
                    type: integer

  /media:
    get:
      tags: [Media]
      summary: List media
      operationId: listMedia
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
        - name: mime_type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of media items
    post:
      tags: [Media]
      summary: Upload media
      operationId: uploadMedia
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                alt:
                  type: string
      responses:
        '201':
          description: Media uploaded

  /media/from-url:
    post:
      tags: [Media]
      summary: Upload from URL
      description: Download and upload media from an external URL
      operationId: uploadFromUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                title:
                  type: string
                alt:
                  type: string
                filename:
                  type: string
      responses:
        '201':
          description: Media uploaded

  /media/bulk:
    post:
      tags: [Media]
      summary: Bulk upload from URLs
      description: Upload multiple media items from URLs in a single request (max 20)
      operationId: bulkUploadMedia
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                  maxItems: 20
                  description: Simple array of URLs
                items:
                  type: array
                  items:
                    type: object
                    required: [url]
                    properties:
                      url:
                        type: string
                        format: uri
                      title:
                        type: string
                      alt:
                        type: string
                  maxItems: 20
                  description: Array of objects with URL and metadata
      responses:
        '200':
          description: Bulk upload results
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploaded:
                    type: integer
                  failed:
                    type: integer
                  media:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        url:
                          type: string
                        title:
                          type: string
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        url:
                          type: string
                        error:
                          type: string

  /elementor/status:
    get:
      tags: [Elementor]
      summary: Get Elementor status
      operationId: getElementorStatus
      responses:
        '200':
          description: Elementor status
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  version:
                    type: string
                  pro:
                    type: boolean
                  pro_version:
                    type: string

  /elementor/{id}:
    get:
      tags: [Elementor]
      summary: Get page Elementor data
      operationId: getElementorData
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Elementor JSON data
    post:
      tags: [Elementor]
      summary: Update Elementor data
      operationId: setElementorData
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                elementor_data:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Elementor data updated

  /elementor/page:
    post:
      tags: [Elementor]
      summary: Create Elementor page
      operationId: createElementorPage
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                status:
                  type: string
                  enum: [publish, draft, pending, private]
                  default: draft
                elementor_data:
                  type: array
      responses:
        '201':
          description: Elementor page created

  /elementor/templates:
    get:
      tags: [Elementor Pro]
      summary: List templates
      operationId: listTemplates
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - name: type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of templates
    post:
      tags: [Elementor Pro]
      summary: Create template
      operationId: createTemplate
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                type:
                  type: string
                elementor_data:
                  type: array
      responses:
        '201':
          description: Template created

  /elementor/clone:
    post:
      tags: [Elementor Pro]
      summary: Clone page
      operationId: clonePage
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [source_id]
              properties:
                source_id:
                  type: integer
                title:
                  type: string
                status:
                  type: string
      responses:
        '201':
          description: Page cloned

  /elementor/landing-page:
    post:
      tags: [Elementor Pro]
      summary: Create landing page
      operationId: createLandingPage
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                status:
                  type: string
                sections:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Landing page created

  /seo/status:
    get:
      tags: [SEO]
      summary: Get SEO status
      operationId: getSeoStatus
      responses:
        '200':
          description: SEO plugin status

  /seo/{id}:
    get:
      tags: [SEO]
      summary: Get post SEO data
      operationId: getSeoData
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: SEO metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeoData'
    put:
      tags: [SEO]
      summary: Update post SEO
      operationId: updateSeoData
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeoUpdate'
      responses:
        '200':
          description: SEO updated

  /seo/bulk:
    post:
      tags: [SEO]
      summary: Bulk update SEO
      operationId: bulkUpdateSeo
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [updates]
              properties:
                updates:
                  type: array
                  items:
                    type: object
                    required: [id]
                    properties:
                      id:
                        type: integer
                      title:
                        type: string
                      description:
                        type: string
      responses:
        '200':
          description: Bulk update complete

  /users:
    get:
      tags: [Users]
      summary: List users
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
        - name: role
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of users
    post:
      tags: [Users]
      summary: Create user
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User details
    put:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: User updated
    delete:
      tags: [Users]
      summary: Delete user
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: reassign
          in: query
          schema:
            type: integer
          description: User ID to reassign posts to
      responses:
        '200':
          description: User deleted

  /users/stats:
    get:
      tags: [Users]
      summary: Get user statistics
      operationId: getUserStats
      responses:
        '200':
          description: User statistics

  /users/roles:
    get:
      tags: [Users]
      summary: List roles
      operationId: listRoles
      responses:
        '200':
          description: Available roles

  /menus:
    get:
      tags: [Menus]
      summary: List menus
      operationId: listMenus
      responses:
        '200':
          description: List of menus
    post:
      tags: [Menus]
      summary: Create menu
      operationId: createMenu
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                location:
                  type: string
      responses:
        '201':
          description: Menu created

  /menus/locations:
    get:
      tags: [Menus]
      summary: Get menu locations
      operationId: getMenuLocations
      responses:
        '200':
          description: Available menu locations

  /settings:
    get:
      tags: [Settings]
      summary: Get site settings
      operationId: getSettings
      responses:
        '200':
          description: Site settings
    put:
      tags: [Settings]
      summary: Update settings
      operationId: updateSettings
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                tagline:
                  type: string
                admin_email:
                  type: string
                  format: email
                timezone:
                  type: string
                posts_per_page:
                  type: integer
      responses:
        '200':
          description: Settings updated

  /options:
    get:
      tags: [Options]
      summary: Get site options
      description: Get reading and front page settings
      operationId: getOptions
      responses:
        '200':
          description: Site options
          content:
            application/json:
              schema:
                type: object
                properties:
                  show_on_front:
                    type: string
                    enum: [posts, page]
                  page_on_front:
                    type: integer
                  page_for_posts:
                    type: integer
                  posts_per_page:
                    type: integer
                  posts_per_rss:
                    type: integer
                  blog_public:
                    type: string
    put:
      tags: [Options]
      summary: Update site options
      operationId: updateOptions
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                show_on_front:
                  type: string
                  enum: [posts, page]
                page_on_front:
                  type: integer
                page_for_posts:
                  type: integer
                posts_per_page:
                  type: integer
                  minimum: 1
                  maximum: 100
      responses:
        '200':
          description: Options updated

  /favicon:
    get:
      tags: [Favicon]
      summary: Get site favicon
      description: Get site icon (favicon) information
      operationId: getFavicon
      responses:
        '200':
          description: Favicon information
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_icon:
                    type: boolean
                  attachment_id:
                    type: integer
                    nullable: true
                  sizes:
                    type: object
                    properties:
                      '32':
                        type: string
                      '180':
                        type: string
                      '192':
                        type: string
                      '270':
                        type: string
                      '512':
                        type: string
    put:
      tags: [Favicon]
      summary: Set site favicon
      operationId: setFavicon
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                attachment_id:
                  type: integer
                  description: Media library attachment ID
                url:
                  type: string
                  format: uri
                  description: URL to download and set as favicon
      responses:
        '200':
          description: Favicon updated
    delete:
      tags: [Favicon]
      summary: Remove site favicon
      operationId: deleteFavicon
      responses:
        '200':
          description: Favicon removed

  /widgets/sidebars:
    get:
      tags: [Widgets]
      summary: List sidebars
      description: Get all registered widget areas/sidebars
      operationId: listSidebars
      responses:
        '200':
          description: List of sidebars
          content:
            application/json:
              schema:
                type: object
                properties:
                  sidebars:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        widgets:
                          type: array
                          items:
                            type: string
                  total:
                    type: integer

  /widgets/types:
    get:
      tags: [Widgets]
      summary: List widget types
      description: Get all registered widget types
      operationId: listWidgetTypes
      responses:
        '200':
          description: Available widget types

  /widgets:
    get:
      tags: [Widgets]
      summary: List widgets
      description: Get all active widget instances
      operationId: listWidgets
      parameters:
        - name: sidebar
          in: query
          schema:
            type: string
          description: Filter by sidebar ID
      responses:
        '200':
          description: List of widgets
    post:
      tags: [Widgets]
      summary: Create widget
      operationId: createWidget
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [type, sidebar]
              properties:
                type:
                  type: string
                sidebar:
                  type: string
                settings:
                  type: object
      responses:
        '201':
          description: Widget created

  /widgets/{id}:
    get:
      tags: [Widgets]
      summary: Get widget
      operationId: getWidget
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Widget details
    put:
      tags: [Widgets]
      summary: Update widget
      operationId: updateWidget
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                settings:
                  type: object
      responses:
        '200':
          description: Widget updated
    delete:
      tags: [Widgets]
      summary: Delete widget
      operationId: deleteWidget
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Widget deleted

  /widgets/{id}/move:
    post:
      tags: [Widgets]
      summary: Move widget to sidebar
      operationId: moveWidget
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [sidebar]
              properties:
                sidebar:
                  type: string
                position:
                  type: integer
      responses:
        '200':
          description: Widget moved

  /themes/detect:
    get:
      tags: [Themes]
      summary: Detect active theme
      description: Detect the active WordPress theme and its support level
      operationId: detectTheme
      responses:
        '200':
          description: Theme detection results
          content:
            application/json:
              schema:
                type: object
                properties:
                  active_theme:
                    type: string
                  theme_name:
                    type: string
                  theme_version:
                    type: string
                  is_supported:
                    type: boolean
                  supported_features:
                    type: array
                    items:
                      type: string

  /themes/supported:
    get:
      tags: [Themes]
      summary: List supported themes
      description: Get all themes with advanced settings support
      operationId: listSupportedThemes
      responses:
        '200':
          description: Supported themes list

  /themes/settings:
    get:
      tags: [Themes]
      summary: Get theme settings
      description: Get settings for the active theme in normalized format
      operationId: getThemeSettings
      responses:
        '200':
          description: Theme settings
    put:
      tags: [Themes]
      summary: Update theme settings
      operationId: updateThemeSettings
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                colors:
                  type: object
                typography:
                  type: object
                header:
                  type: object
                footer:
                  type: object
      responses:
        '200':
          description: Settings updated

  /themes/astra/colors:
    get:
      tags: [Themes]
      summary: Get Astra colors
      operationId: getAstraColors
      responses:
        '200':
          description: Astra color settings
    put:
      tags: [Themes]
      summary: Update Astra colors
      operationId: updateAstraColors
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Colors updated

  /themes/astra/typography:
    get:
      tags: [Themes]
      summary: Get Astra typography
      operationId: getAstraTypography
      responses:
        '200':
          description: Astra typography settings
    put:
      tags: [Themes]
      summary: Update Astra typography
      operationId: updateAstraTypography
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Typography updated

  /theme-builder/status:
    get:
      tags: [Theme Builder]
      summary: Get Theme Builder status
      operationId: getThemeBuilderStatus
      responses:
        '200':
          description: Theme Builder availability

  /theme-builder/locations:
    get:
      tags: [Theme Builder]
      summary: Get theme locations
      operationId: getThemeLocations
      responses:
        '200':
          description: Available theme locations

  /theme-builder/conditions:
    get:
      tags: [Theme Builder]
      summary: Get available conditions
      operationId: getAvailableConditions
      responses:
        '200':
          description: Display condition options

  /theme-builder/templates:
    get:
      tags: [Theme Builder]
      summary: List Theme Builder templates
      operationId: listThemeTemplates
      responses:
        '200':
          description: Theme Builder templates

  /theme-builder/templates/{id}/conditions:
    get:
      tags: [Theme Builder]
      summary: Get template conditions
      operationId: getTemplateConditions
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Template conditions
    put:
      tags: [Theme Builder]
      summary: Set template conditions
      operationId: setTemplateConditions
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [conditions]
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [include, exclude]
                      name:
                        type: string
                      sub_name:
                        type: string
      responses:
        '200':
          description: Conditions updated
    delete:
      tags: [Theme Builder]
      summary: Remove conditions
      operationId: removeTemplateConditions
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Conditions removed

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer

  parameters:
    PostId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Post/Page ID
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 10
        maximum: 100
      description: Items per page
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
      description: Page number

  responses:
    Unauthorized:
      description: API key missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        data:
          type: object
          properties:
            status:
              type: integer

    SiteInfo:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        url:
          type: string
          format: uri
        admin_url:
          type: string
          format: uri
        wp_version:
          type: string
        php_version:
          type: string
        theme:
          type: object
          properties:
            name:
              type: string
            version:
              type: string
        capabilities:
          type: object

    Post:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        status:
          type: string
        content:
          type: string
        excerpt:
          type: string
        author:
          type: integer
        date:
          type: string
          format: date-time
        modified:
          type: string
          format: date-time
        link:
          type: string
          format: uri
        featured_image:
          type: string
          nullable: true
        categories:
          type: array
          items:
            type: integer
        tags:
          type: array
          items:
            type: integer

    PostList:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        total:
          type: integer
        pages:
          type: integer
        page:
          type: integer

    PostCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [publish, draft, pending, private]
          default: draft
        excerpt:
          type: string

    PostUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        status:
          type: string
        excerpt:
          type: string

    PageCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
        content:
          type: string
        status:
          type: string
          default: draft
        parent:
          type: integer
        template:
          type: string

    PageUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        status:
          type: string
        parent:
          type: integer
        template:
          type: string

    SeoData:
      type: object
      properties:
        post_id:
          type: integer
        title:
          type: string
        description:
          type: string
        focus_keyword:
          type: string
        canonical:
          type: string
        og_title:
          type: string
        og_description:
          type: string
        og_image:
          type: string
        robots_noindex:
          type: boolean
        robots_nofollow:
          type: boolean

    SeoUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        focus_keyword:
          type: string
        canonical:
          type: string
        og_title:
          type: string
        og_description:
          type: string
        og_image:
          type: string
        robots_noindex:
          type: boolean
        robots_nofollow:
          type: boolean

    UserCreate:
      type: object
      required: [username, email]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        display_name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          default: subscriber
        send_notification:
          type: boolean
          default: false

    UserUpdate:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        display_name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
