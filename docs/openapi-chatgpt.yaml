openapi: 3.1.0
info:
  title: MCPWP — WordPress Manager
  description: |
    Manage any WordPress site through conversation. Create and edit posts, pages, Elementor
    layouts, SEO metadata, menus, media, and more — all via API.

    **Authentication:** Every request requires `X-API-Key` header.
    Get your key from WordPress Admin → MCPWP → Setup → Generate API Key.

    **First call:** Always call `GET /onboard` first on a new site. It returns the complete
    site briefing: content inventory, active plugins, Elementor layout mode, and recommended
    first actions.
  version: 2.8.50
  contact:
    name: MCPWP
    url: https://mcpwp.net
    email: support@mcpwp.net

servers:
  - url: https://{site}/wp-json/site-pilot-ai/v1
    description: Your WordPress site
    variables:
      site:
        default: example.com
        description: Your WordPress site domain (e.g., mybusiness.com)

security:
  - apiKey: []

tags:
  - name: Onboarding
    description: First-call site briefing and discovery
  - name: Site
    description: Site information, settings, and analytics
  - name: Posts
    description: Blog posts management
  - name: Pages
    description: Page management
  - name: Content
    description: Drafts, search, and bulk operations
  - name: Media
    description: Upload and manage images/files
  - name: Menus
    description: Navigation menus
  - name: Elementor
    description: Visual page builder — Elementor layouts and widgets
  - name: SEO
    description: Site-wide SEO audit, page readiness, and issue tracking
  - name: Approvals
    description: Human-in-the-loop approval workflow for AI changes
  - name: Batch
    description: Multi-request batching

paths:
  # ============ ONBOARDING ============
  /onboard:
    get:
      tags: [Onboarding]
      operationId: onboard
      summary: Get full site briefing (call this first)
      description: |
        Returns a complete site briefing. Always call this first on a new site connection.

        Returns:
        - Site name, URL, WordPress version, active theme
        - Content inventory: page/post/media counts
        - Active plugins (Elementor, WooCommerce, SEO plugin, etc.)
        - `elementor_layout_mode`: "classic" (section > column > widget) or "container" (flexbox)
        - Available tool categories
        - Recommended first actions

        Use `elementor_layout_mode` from this response before writing any Elementor data.
      responses:
        '200':
          description: Site briefing
          content:
            application/json:
              schema:
                type: object
                properties:
                  site:
                    $ref: '#/components/schemas/SiteInfo'
                  content_inventory:
                    type: object
                    properties:
                      pages: {type: integer}
                      posts: {type: integer}
                      media: {type: integer}
                      drafts: {type: integer}
                  elementor_layout_mode:
                    type: string
                    enum: [classic, container]
                    description: "classic = section>column>widget; container = flexbox container>widget"
                  active_plugins:
                    type: array
                    items: {type: string}
                  capabilities:
                    type: object
                  recommended_actions:
                    type: array
                    items: {type: string}
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============ SITE ============
  /site-info:
    get:
      tags: [Site]
      operationId: getSiteInfo
      summary: Get site information
      description: |
        Returns basic site info: name, URL, WordPress version, theme, and active plugin capabilities.
        Use `/onboard` for the full briefing including content inventory.
      responses:
        '200':
          description: Site information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics:
    get:
      tags: [Site]
      operationId: getAnalytics
      summary: Get content analytics
      description: |
        Content overview: post/page/media counts, recent activity, MCP tool usage.
        Use when user asks "how's my site doing?" or wants a content summary.
      parameters:
        - name: days
          in: query
          schema: {type: integer, default: 30, minimum: 1, maximum: 365}
          description: Days to analyze for recent activity
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: object
                    properties:
                      total: {type: integer}
                      published: {type: integer}
                      draft: {type: integer}
                  pages:
                    type: object
                    properties:
                      total: {type: integer}
                      published: {type: integer}
                  media: {type: integer}
                  categories: {type: integer}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /settings:
    get:
      tags: [Site]
      operationId: getSettings
      summary: Get plugin settings
      description: Get current MCPWP settings including rate limits, analytics toggle, logging config.
      responses:
        '200':
          description: Plugin settings
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Site]
      operationId: updateSettings
      summary: Update plugin settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                analytics_enabled: {type: boolean}
                logging_enabled: {type: boolean}
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============ SEARCH ============
  /search:
    get:
      tags: [Content]
      operationId: searchContent
      summary: Search posts and pages
      description: |
        Search across all posts and pages by keyword.
        Use when user asks "find posts about X" or "do I have a page about Y".
      parameters:
        - name: q
          in: query
          required: true
          schema: {type: string}
          description: Search keyword or phrase
        - name: type
          in: query
          schema:
            type: string
            enum: [post, page, any]
            default: any
        - name: per_page
          in: query
          schema: {type: integer, default: 10}
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Post'
                  total: {type: integer}
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============ POSTS ============
  /posts:
    get:
      tags: [Posts]
      operationId: listPosts
      summary: List blog posts
      description: Get posts with pagination and filtering. Defaults to published posts.
      parameters:
        - name: per_page
          in: query
          schema: {type: integer, default: 10, maximum: 100}
        - name: page
          in: query
          schema: {type: integer, default: 1}
        - name: status
          in: query
          schema:
            type: string
            enum: [publish, draft, pending, private, any]
            default: publish
        - name: category
          in: query
          schema: {type: integer}
          description: Filter by category ID
        - name: search
          in: query
          schema: {type: string}
      responses:
        '200':
          description: Posts list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Posts]
      operationId: createPost
      summary: Create a blog post
      description: |
        Create a new blog post. Default status is "draft" for safety — always confirm before publishing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreate'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /posts/{id}:
    get:
      tags: [Posts]
      operationId: getPost
      summary: Get a post
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Post data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Posts]
      operationId: updatePost
      summary: Update a blog post
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdate'
      responses:
        '200':
          description: Post updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Posts]
      operationId: deletePost
      summary: Delete a blog post
      description: Permanently deletes the post. ALWAYS confirm with user before deleting.
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Post deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: {type: boolean}
                  id: {type: integer}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /posts/{id}/featured-image:
    post:
      tags: [Posts]
      operationId: setPostFeaturedImage
      summary: Set featured image for post
      description: Assign a media library item as the featured image for a post.
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [media_id]
              properties:
                media_id:
                  type: integer
                  description: Media attachment ID to use as featured image
      responses:
        '200':
          description: Featured image set
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  featured_image_url: {type: string, format: uri}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ PAGES ============
  /pages:
    get:
      tags: [Pages]
      operationId: listPages
      summary: List pages
      parameters:
        - name: per_page
          in: query
          schema: {type: integer, default: 10, maximum: 100}
        - name: page
          in: query
          schema: {type: integer, default: 1}
        - name: status
          in: query
          schema:
            type: string
            enum: [publish, draft, pending, private, any]
            default: publish
      responses:
        '200':
          description: Pages list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Pages]
      operationId: createPage
      summary: Create a page
      description: Create a new page. Default status is "draft" — confirm before publishing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageCreate'
      responses:
        '201':
          description: Page created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /pages/{id}:
    get:
      tags: [Pages]
      operationId: getPage
      summary: Get a page
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Page data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Pages]
      operationId: updatePage
      summary: Update a page
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PageUpdate'
      responses:
        '200':
          description: Page updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Pages]
      operationId: deletePage
      summary: Delete a page
      description: Permanently deletes the page. ALWAYS confirm with user before deleting.
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Page deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: {type: boolean}
                  id: {type: integer}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /pages/{id}/clone:
    post:
      tags: [Pages]
      operationId: clonePage
      summary: Duplicate a page
      description: Clone a page including all content and Elementor data. Created as draft.
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Custom title for the clone (defaults to original title + " (Copy)")
      responses:
        '201':
          description: Page cloned
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: {type: integer}
                  title: {type: string}
                  url: {type: string, format: uri}
                  edit_url: {type: string, format: uri}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /pages/by-slug/{slug}:
    get:
      tags: [Pages]
      operationId: getPageBySlug
      summary: Get page by URL slug
      description: |
        Look up a page by its URL slug instead of ID.
        Use when user says "edit the About page" or "find the contact page".
      parameters:
        - name: slug
          in: path
          required: true
          schema: {type: string}
          description: URL slug (e.g., "about-us", "contact")
      responses:
        '200':
          description: Page found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ CONTENT / DRAFTS ============
  /drafts:
    get:
      tags: [Content]
      operationId: listDrafts
      summary: List all drafts
      description: Get all draft posts and pages.
      responses:
        '200':
          description: Drafts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  drafts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Post'
                  total: {type: integer}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /drafts/delete-all:
    delete:
      tags: [Content]
      operationId: deleteAllDrafts
      summary: Delete all drafts
      description: |
        Bulk delete all draft posts and pages. Permanently removes all drafts.
        WARNING: Destructive — cannot be undone. Always confirm with user first.
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [post, page, all]
            default: all
      responses:
        '200':
          description: Drafts deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: {type: integer}
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============ MEDIA ============
  /media:
    get:
      tags: [Media]
      operationId: listMedia
      summary: List media library
      parameters:
        - name: per_page
          in: query
          schema: {type: integer, default: 20, maximum: 100}
        - name: page
          in: query
          schema: {type: integer, default: 1}
        - name: media_type
          in: query
          schema:
            type: string
            enum: [image, video, audio, document]
      responses:
        '200':
          description: Media items
          content:
            application/json:
              schema:
                type: object
                properties:
                  media:
                    type: array
                    items:
                      $ref: '#/components/schemas/MediaItem'
                  total: {type: integer}
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Media]
      operationId: uploadMedia
      summary: Upload media file
      description: Upload a file directly to the media library.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                alt_text:
                  type: string
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /media/from-url:
    post:
      tags: [Media]
      operationId: uploadMediaFromUrl
      summary: Import media from URL
      description: |
        Import an image or file from a URL into the WordPress media library.
        Preferred method for AI assistants — provide a URL instead of uploading a file.
        The file is downloaded server-side and added to the library.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  description: URL of the file to import
                filename:
                  type: string
                  description: Custom filename (optional)
                title:
                  type: string
                alt_text:
                  type: string
                  description: Alt text for images (SEO and accessibility)
            examples:
              import_image:
                summary: Import an image
                value:
                  url: "https://example.com/hero-photo.jpg"
                  title: "Homepage hero"
                  alt_text: "Team working on a laptop"
      responses:
        '201':
          description: Media imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /media/{id}:
    delete:
      tags: [Media]
      operationId: deleteMedia
      summary: Delete a media item
      description: Permanently delete a media item. Confirm with user first.
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        '200':
          description: Media deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: {type: boolean}
                  id: {type: integer}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ MENUS ============
  /menus:
    get:
      tags: [Menus]
      operationId: listMenus
      summary: List navigation menus
      description: Get all navigation menus and their theme location assignments.
      responses:
        '200':
          description: Menus list
          content:
            application/json:
              schema:
                type: object
                properties:
                  menus:
                    type: array
                    items:
                      $ref: '#/components/schemas/Menu'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Menus]
      operationId: createMenu
      summary: Create a navigation menu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: {type: string}
                location:
                  type: string
                  description: Theme menu location slug (e.g., "primary", "footer")
      responses:
        '201':
          description: Menu created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /menus/setup:
    post:
      tags: [Menus]
      operationId: setupMenu
      summary: Create menu with items in one call
      description: |
        Create a complete navigation menu with items in a single request.
        Most efficient way to build a menu from scratch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, items]
              properties:
                name: {type: string, description: "Menu name"}
                location:
                  type: string
                  description: Theme location slug (e.g., "primary", "footer")
                items:
                  type: array
                  items:
                    type: object
                    required: [title]
                    properties:
                      title: {type: string}
                      url: {type: string}
                      page_id: {type: integer, description: "Link to a specific page by ID"}
                      parent: {type: integer, description: "Parent item index (0-based) for sub-menus"}
            examples:
              main_nav:
                summary: Create main navigation
                value:
                  name: "Main Navigation"
                  location: "primary"
                  items:
                    - {title: "Home", url: "/"}
                    - {title: "About", page_id: 5}
                    - {title: "Services", url: "/services"}
                    - {title: "Contact", page_id: 12}
      responses:
        '201':
          description: Menu created with items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /menus/{id}/items:
    get:
      tags: [Menus]
      operationId: listMenuItems
      summary: List menu items
      parameters:
        - $ref: '#/components/parameters/MenuId'
      responses:
        '200':
          description: Menu items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/MenuItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Menus]
      operationId: addMenuItem
      summary: Add item to menu
      parameters:
        - $ref: '#/components/parameters/MenuId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: {type: string}
                url: {type: string}
                page_id: {type: integer, description: "Link to a page by ID"}
                parent_id: {type: integer, description: "Parent menu item ID for dropdown"}
                position: {type: integer, description: "Position in menu (0-based)"}
      responses:
        '201':
          description: Item added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ ELEMENTOR ============
  /elementor/{id}:
    get:
      tags: [Elementor]
      operationId: getElementorData
      summary: Get Elementor page data
      description: |
        Get the full Elementor JSON structure for a page.
        Check `elementor_layout_mode` from `/onboard` first:
        - "classic": structure is section > column > widget
        - "container": structure is container > widget (flexbox)
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Elementor data
          content:
            application/json:
              schema:
                type: object
                properties:
                  post_id: {type: integer}
                  elementor_data:
                    type: array
                    description: Elementor JSON structure (array of sections/containers)
                  edit_url: {type: string, format: uri}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Elementor]
      operationId: setElementorData
      summary: Set full Elementor page data
      description: |
        Replace the entire Elementor structure for a page. Use this to build or fully rebuild a page.

        Response includes `warnings` array — check for unknown widget types or structural issues.

        For targeted edits, prefer `editElementorSection` or `editElementorWidget`.
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                elementor_data:
                  type: array
                  description: Elementor structure as array
                elementor_json:
                  type: string
                  description: Elementor structure as JSON string (alternative to array)
            examples:
              simple_page:
                summary: Simple heading page
                value:
                  elementor_data:
                    - id: "sec1"
                      elType: "section"
                      settings: {}
                      elements:
                        - id: "col1"
                          elType: "column"
                          settings: {_column_size: 100}
                          elements:
                            - id: "w1"
                              elType: "widget"
                              widgetType: "heading"
                              settings: {title: "Welcome", header_size: "h1"}
      responses:
        '200':
          description: Elementor data saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  post_id: {type: integer}
                  warnings:
                    type: array
                    items: {type: string}
                    description: Structural warnings (unknown widgets, missing IDs, etc.)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /elementor/{id}/summary:
    get:
      tags: [Elementor]
      operationId: getElementorSummary
      summary: Get Elementor page summary (lightweight)
      description: |
        Returns a compact summary of the Elementor structure without the full JSON data.
        Use this to understand page layout before making targeted edits — much faster than
        loading the full data.
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Page summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  post_id: {type: integer}
                  sections:
                    type: array
                    items:
                      type: object
                      properties:
                        index: {type: integer}
                        id: {type: string}
                        type: {type: string}
                        widgets:
                          type: array
                          items: {type: string}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /elementor/{id}/edit-section:
    put:
      tags: [Elementor]
      operationId: editElementorSection
      summary: Edit one section on an Elementor page
      description: |
        Update settings for a single section (background, padding, etc.) without replacing
        the full page data. Safer than `setElementorData` for targeted changes.
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [section_index]
              properties:
                section_index:
                  type: integer
                  description: Zero-based index of the section to edit
                settings:
                  type: object
                  description: Section settings to update (merged with existing)
            examples:
              change_background:
                summary: Change section background color
                value:
                  section_index: 0
                  settings:
                    background_background: "classic"
                    background_color: "#1a1a2e"
      responses:
        '200':
          description: Section updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  post_id: {type: integer}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /elementor/{id}/edit-widget:
    put:
      tags: [Elementor]
      operationId: editElementorWidget
      summary: Edit one widget on an Elementor page
      description: |
        Update settings for a specific widget by its ID. Use the widget ID from
        `getElementorData` or `getElementorSummary`.

        Most efficient way to update a specific piece of text, image, or button.
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [widget_id, settings]
              properties:
                widget_id:
                  type: string
                  description: 8-char widget ID from the Elementor data
                settings:
                  type: object
                  description: Widget settings to update
            examples:
              update_heading:
                summary: Update heading text
                value:
                  widget_id: "abc12345"
                  settings:
                    title: "New Heading Text"
              update_button:
                summary: Update button
                value:
                  widget_id: "def67890"
                  settings:
                    text: "Book Now"
                    link: {url: "/contact"}
      responses:
        '200':
          description: Widget updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  post_id: {type: integer}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /elementor/{id}/add-section:
    post:
      tags: [Elementor]
      operationId: addElementorSection
      summary: Add a new section to an Elementor page
      description: Append or insert a new section into an existing Elementor page.
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [section]
              properties:
                section:
                  type: object
                  description: Full section element object (elType, settings, elements)
                position:
                  type: integer
                  description: Insert at this index (default = append at end)
      responses:
        '200':
          description: Section added
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  post_id: {type: integer}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /elementor/{id}/find-replace:
    post:
      tags: [Elementor]
      operationId: elementorFindReplace
      summary: Find and replace text across an Elementor page
      description: |
        Find all occurrences of a string and replace with another across all widgets on a page.
        Useful for bulk text updates (e.g., updating phone numbers, company names, URLs).
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [find, replace]
              properties:
                find:
                  type: string
                  description: Text to find (exact match, case-sensitive)
                replace:
                  type: string
                  description: Replacement text
            examples:
              update_phone:
                summary: Update phone number
                value:
                  find: "555-0100"
                  replace: "555-0199"
      responses:
        '200':
          description: Find/replace complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  replacements: {type: integer, description: "Number of replacements made"}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /elementor/widgets:
    get:
      tags: [Elementor]
      operationId: listElementorWidgets
      summary: List available Elementor widgets
      description: Get all registered Elementor widget types available on this site.
      responses:
        '200':
          description: Widget types
          content:
            application/json:
              schema:
                type: object
                properties:
                  widgets:
                    type: array
                    items: {type: string}
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============ SEO ============
  /seo/audit:
    get:
      tags: [SEO]
      operationId: seoAuditSite
      summary: Run site-wide SEO audit
      description: |
        Audit the entire site for SEO issues: missing meta descriptions, duplicate titles,
        broken links, missing alt text, thin content, and more.
        Returns issues grouped by severity.
      responses:
        '200':
          description: Audit results
          content:
            application/json:
              schema:
                type: object
                properties:
                  score: {type: integer, description: "Overall SEO score 0-100"}
                  issues:
                    type: array
                    items:
                      $ref: '#/components/schemas/SeoIssue'
                  summary:
                    type: object
                    properties:
                      critical: {type: integer}
                      warning: {type: integer}
                      info: {type: integer}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /seo/issues:
    get:
      tags: [SEO]
      operationId: getSeoIssues
      summary: Get stored SEO issues
      description: Retrieve previously stored SEO issues from the last audit.
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, warning, info, all]
            default: all
      responses:
        '200':
          description: SEO issues
          content:
            application/json:
              schema:
                type: object
                properties:
                  issues:
                    type: array
                    items:
                      $ref: '#/components/schemas/SeoIssue'
                  total: {type: integer}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /seo/readiness/{id}:
    get:
      tags: [SEO]
      operationId: validateSeoReadiness
      summary: Check SEO readiness before publishing
      description: |
        Pre-publish SEO validation for a specific post or page.
        Returns a go/no-go verdict with actionable fixes.
        Always run this before publishing important content.
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: SEO readiness check
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready: {type: boolean}
                  score: {type: integer}
                  issues:
                    type: array
                    items:
                      $ref: '#/components/schemas/SeoIssue'
                  recommendations:
                    type: array
                    items: {type: string}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /seo/{id}:
    get:
      tags: [SEO]
      operationId: getSeoData
      summary: Get SEO metadata for a post/page
      description: Get SEO title, description, focus keyword, and Open Graph data. Works with Yoast SEO and Rank Math.
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: SEO data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeoData'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [SEO]
      operationId: updateSeoData
      summary: Update SEO metadata for a post/page
      description: |
        Set SEO title, description, and focus keyword.
        Best practices: title 50-60 chars, description 150-160 chars.
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeoUpdate'
      responses:
        '200':
          description: SEO data updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeoData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ APPROVALS ============
  /approvals:
    get:
      tags: [Approvals]
      operationId: listApprovals
      summary: List approval requests
      description: Get pending, approved, and rejected approval requests.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, applied, all]
            default: pending
      responses:
        '200':
          description: Approval requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  approvals:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApprovalRequest'
                  total: {type: integer}
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Approvals]
      operationId: createApproval
      summary: Create an approval request
      description: |
        Stage a change for human review before applying it.
        Use for significant changes: publishing pages, SEO updates, bulk operations.
        The change is NOT applied until approved and `applyApproval` is called.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tool, params]
              properties:
                tool:
                  type: string
                  description: MCP tool name (e.g., "wp_set_elementor")
                params:
                  type: object
                  description: Tool parameters to stage
                description:
                  type: string
                  description: Human-readable description of the change
            examples:
              stage_elementor:
                summary: Stage Elementor change for review
                value:
                  tool: "wp_set_elementor"
                  params: {id: 5, elementor_data: []}
                  description: "Rebuild homepage hero section"
      responses:
        '201':
          description: Approval request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /approvals/{id}/approve:
    post:
      tags: [Approvals]
      operationId: approveRequest
      summary: Approve a pending request
      description: Mark an approval request as approved. Call `applyApproval` to execute it.
      parameters:
        - $ref: '#/components/parameters/ApprovalId'
      responses:
        '200':
          description: Request approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /approvals/{id}/apply:
    post:
      tags: [Approvals]
      operationId: applyApproval
      summary: Apply an approved change
      description: Execute a previously approved change. Creates a rollback snapshot automatically.
      parameters:
        - $ref: '#/components/parameters/ApprovalId'
      responses:
        '200':
          description: Change applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  approval_id: {type: integer}
                  rollback_available: {type: boolean}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /approvals/{id}/rollback:
    post:
      tags: [Approvals]
      operationId: rollbackApproval
      summary: Roll back an applied change
      description: Undo a previously applied change using its stored snapshot.
      parameters:
        - $ref: '#/components/parameters/ApprovalId'
      responses:
        '200':
          description: Change rolled back
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  approval_id: {type: integer}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ BATCH ============
  /batch:
    post:
      tags: [Batch]
      operationId: batchRequests
      summary: Execute multiple API requests in one call
      description: |
        Send multiple API requests in a single HTTP call. Responses are returned in order.
        Use this to reduce round-trips when you need to update several pages, posts, or settings at once.

        Max 20 requests per batch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requests]
              properties:
                requests:
                  type: array
                  maxItems: 20
                  items:
                    type: object
                    required: [method, path]
                    properties:
                      method:
                        type: string
                        enum: [GET, POST, PUT, DELETE]
                      path:
                        type: string
                        description: API path (e.g., "/pages/5")
                      body:
                        type: object
                        description: Request body for POST/PUT requests
            examples:
              update_multiple_posts:
                summary: Update SEO on multiple pages
                value:
                  requests:
                    - method: POST
                      path: "/seo/5"
                      body: {title: "Home | Acme Inc", description: "Acme Inc homepage"}
                    - method: POST
                      path: "/seo/12"
                      body: {title: "About | Acme Inc", description: "Learn about Acme Inc"}
      responses:
        '200':
          description: Batch results
          content:
            application/json:
              schema:
                type: object
                properties:
                  responses:
                    type: array
                    items:
                      type: object
                      properties:
                        status: {type: integer}
                        body: {type: object}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

# ============ COMPONENTS ============
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        MCPWP API key. Get from WordPress Admin → MCPWP → Setup → Generate API Key.
        Format: spai_xxxxxxxxxxxxxxxxxxxxxxxx

  parameters:
    PostId:
      name: id
      in: path
      required: true
      description: Post or page ID
      schema: {type: integer}
      example: 42

    MenuId:
      name: id
      in: path
      required: true
      description: Menu ID
      schema: {type: integer}

    ApprovalId:
      name: id
      in: path
      required: true
      description: Approval request ID
      schema: {type: integer}

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: rest_forbidden
            message: Invalid or missing API key
            data: {status: 401}

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: rest_post_invalid_id
            message: Post not found
            data: {status: 404}

    BadRequest:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: rest_invalid_param
            message: Invalid parameter(s)
            data: {status: 400}

  schemas:
    Error:
      type: object
      properties:
        code: {type: string}
        message: {type: string}
        data:
          type: object
          properties:
            status: {type: integer}

    SiteInfo:
      type: object
      properties:
        name: {type: string, example: "Acme Inc"}
        description: {type: string}
        url: {type: string, format: uri}
        admin_url: {type: string, format: uri}
        wp_version: {type: string, example: "6.7.2"}
        php_version: {type: string}
        mcpwp_version: {type: string, example: "2.8.49"}
        theme:
          type: object
          properties:
            name: {type: string}
            version: {type: string}
        capabilities:
          type: object
          properties:
            elementor: {type: boolean}
            elementor_layout_mode:
              type: string
              enum: [classic, container]
            woocommerce: {type: boolean}
            seo_plugin: {type: string, nullable: true}

    Post:
      type: object
      properties:
        id: {type: integer}
        title: {type: string}
        slug: {type: string}
        status:
          type: string
          enum: [publish, draft, pending, private]
        content: {type: string, description: "Post content (HTML)"}
        excerpt: {type: string}
        date: {type: string, format: date-time}
        modified: {type: string, format: date-time}
        link: {type: string, format: uri}
        featured_image: {type: string, format: uri, nullable: true}
        categories:
          type: array
          items: {type: integer}
        tags:
          type: array
          items: {type: integer}

    PostList:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        total: {type: integer}
        pages: {type: integer}
        page: {type: integer}

    PostCreate:
      type: object
      required: [title]
      properties:
        title: {type: string}
        content: {type: string, description: "HTML content"}
        status:
          type: string
          enum: [publish, draft, pending, private]
          default: draft
        excerpt: {type: string}
        categories:
          type: array
          items: {type: integer}
        tags:
          type: array
          items: {type: integer}
        featured_image: {type: integer, description: "Media attachment ID"}

    PostUpdate:
      type: object
      properties:
        title: {type: string}
        content: {type: string}
        status:
          type: string
          enum: [publish, draft, pending, private]
        excerpt: {type: string}
        categories:
          type: array
          items: {type: integer}
        tags:
          type: array
          items: {type: integer}
        featured_image: {type: integer}

    Page:
      type: object
      properties:
        id: {type: integer}
        title: {type: string}
        slug: {type: string}
        status:
          type: string
          enum: [publish, draft, pending, private]
        content: {type: string}
        link: {type: string, format: uri}
        parent: {type: integer, description: "Parent page ID (0 if top-level)"}
        menu_order: {type: integer}
        template: {type: string, description: "Page template filename"}
        date: {type: string, format: date-time}
        modified: {type: string, format: date-time}

    PageList:
      type: object
      properties:
        pages:
          type: array
          items:
            $ref: '#/components/schemas/Page'
        total: {type: integer}
        pages_count: {type: integer}

    PageCreate:
      type: object
      required: [title]
      properties:
        title: {type: string}
        content: {type: string}
        status:
          type: string
          enum: [publish, draft, pending, private]
          default: draft
        parent: {type: integer}
        template: {type: string}

    PageUpdate:
      type: object
      properties:
        title: {type: string}
        content: {type: string}
        status:
          type: string
          enum: [publish, draft, pending, private]
        parent: {type: integer}
        template: {type: string}

    MediaItem:
      type: object
      properties:
        id: {type: integer}
        url: {type: string, format: uri}
        title: {type: string}
        alt_text: {type: string}
        mime_type: {type: string}
        width: {type: integer}
        height: {type: integer}
        sizes:
          type: object
          description: Available image sizes and their URLs

    Menu:
      type: object
      properties:
        id: {type: integer}
        name: {type: string}
        slug: {type: string}
        location: {type: string, nullable: true}
        items_count: {type: integer}

    MenuItem:
      type: object
      properties:
        id: {type: integer}
        title: {type: string}
        url: {type: string}
        target: {type: string}
        parent_id: {type: integer}
        order: {type: integer}
        type: {type: string, description: "custom, post_type, taxonomy"}
        object_id: {type: integer, nullable: true}

    SeoData:
      type: object
      properties:
        post_id: {type: integer}
        title: {type: string, description: "SEO meta title"}
        description: {type: string, description: "SEO meta description"}
        focus_keyword: {type: string, nullable: true}
        og_title: {type: string, nullable: true}
        og_description: {type: string, nullable: true}
        og_image: {type: string, format: uri, nullable: true}
        plugin: {type: string, description: "SEO plugin detected: yoast, rank-math, or none"}

    SeoUpdate:
      type: object
      properties:
        title: {type: string, description: "50-60 characters recommended"}
        description: {type: string, description: "150-160 characters recommended"}
        focus_keyword: {type: string}
        og_title: {type: string}
        og_description: {type: string}
        og_image: {type: integer, description: "Media attachment ID for OG image"}

    SeoIssue:
      type: object
      properties:
        severity:
          type: string
          enum: [critical, warning, info]
        type: {type: string}
        message: {type: string}
        post_id: {type: integer, nullable: true}
        post_title: {type: string, nullable: true}
        fix: {type: string, nullable: true, description: "Suggested fix"}

    ApprovalRequest:
      type: object
      properties:
        id: {type: integer}
        tool: {type: string}
        params: {type: object}
        description: {type: string}
        status:
          type: string
          enum: [pending, approved, rejected, applied, rolled_back]
        created_at: {type: string, format: date-time}
        applied_at: {type: string, format: date-time, nullable: true}
        rollback_available: {type: boolean}
