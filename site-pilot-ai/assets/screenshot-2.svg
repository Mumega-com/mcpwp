<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 761" width="1280" height="761" role="img" aria-labelledby="title desc">
  <title id="title">MCPWP setup screenshot</title>
  <desc id="desc">Setup page with MCP endpoint, API keys, and role-scoped access.</desc>
  <defs><linearGradient id="head" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1220"/><stop offset="1" stop-color="#10264f"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0b1220" flood-opacity="0.12"/></filter></defs>
  <rect width="1280" height="761" fill="#f8fafc"/>
  <rect width="190" height="761" fill="#07101f"/><rect x="0" y="296" width="190" height="44" fill="#2f7cff"/>
  <g font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif"><text x="32" y="324" fill="#fff" font-size="16" font-weight="800">MCPWP</text><text x="32" y="374" fill="#cbd5e1" font-size="15">Setup</text><text x="32" y="418" fill="#94a3b8" font-size="15">Control Room</text><text x="32" y="462" fill="#94a3b8" font-size="15">Tools</text></g>
  <g transform="translate(224 34)" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif">
    <rect width="1018" height="112" rx="20" fill="url(#head)" filter="url(#shadow)"/><text x="32" y="62" fill="#fff" font-size="32" font-weight="850">MCPWP Setup</text><text x="34" y="92" fill="#94a3b8" font-size="15">Connect your site to Claude, ChatGPT, Cursor, and other MCP clients.</text><rect x="858" y="38" width="112" height="34" rx="17" fill="#f0fdf4"/><text x="884" y="60" fill="#166534" font-size="14" font-weight="800">Ready</text>
    <g transform="translate(0 146)">
      <rect width="1018" height="138" rx="18" fill="#fff" stroke="#dbe6f7" filter="url(#shadow)"/><text x="28" y="42" fill="#0b1220" font-size="20" font-weight="850">MCP Endpoint</text><text x="28" y="74" fill="#64748b" font-size="14">Use this URL in your MCP client configuration.</text><rect x="28" y="92" width="742" height="32" rx="9" fill="#0b1220"/><text x="44" y="114" fill="#dbeafe" font-family="SFMono-Regular, Consolas, monospace" font-size="13">https://example.com/wp-json/site-pilot-ai/v1/mcp</text><rect x="794" y="91" width="86" height="34" rx="9" fill="#2f7cff"/><text x="820" y="113" fill="#fff" font-size="13" font-weight="800">Copy</text>
    </g>
    <g transform="translate(0 316)">
      <rect width="486" height="302" rx="18" fill="#fff" stroke="#dbe6f7" filter="url(#shadow)"/><text x="28" y="42" fill="#0b1220" font-size="20" font-weight="850">Scoped API Keys</text><text x="28" y="70" fill="#64748b" font-size="14">Create one key per AI client so access can be revoked safely.</text>
      <g transform="translate(28 102)"><rect width="430" height="50" rx="13" fill="#f8fafc" stroke="#dbe6f7"/><text x="18" y="31" fill="#0b1220" font-size="15" font-weight="800">Claude Desktop</text><rect x="264" y="12" width="66" height="26" rx="13" fill="#eef4ff"/><text x="282" y="30" fill="#1d4ed8" font-size="12" font-weight="800">admin</text><rect x="346" y="12" width="64" height="26" rx="13" fill="#f0fdf4"/><text x="364" y="30" fill="#166534" font-size="12" font-weight="800">active</text></g>
      <g transform="translate(28 170)"><rect width="430" height="50" rx="13" fill="#f8fafc" stroke="#dbe6f7"/><text x="18" y="31" fill="#0b1220" font-size="15" font-weight="800">Content agent</text><rect x="264" y="12" width="66" height="26" rx="13" fill="#eef4ff"/><text x="282" y="30" fill="#1d4ed8" font-size="12" font-weight="800">editor</text><rect x="346" y="12" width="64" height="26" rx="13" fill="#f0fdf4"/><text x="364" y="30" fill="#166534" font-size="12" font-weight="800">active</text></g>
      <rect x="28" y="244" width="154" height="38" rx="10" fill="#2f7cff"/><text x="52" y="269" fill="#fff" font-size="14" font-weight="850">Create Key</text>
    </g>
    <g transform="translate(532 316)">
      <rect width="486" height="302" rx="18" fill="#fff" stroke="#dbe6f7" filter="url(#shadow)"/><text x="28" y="42" fill="#0b1220" font-size="20" font-weight="850">Client Setup</text><text x="28" y="70" fill="#64748b" font-size="14">Copy a ready configuration into your preferred MCP client.</text>
      <rect x="28" y="102" width="430" height="118" rx="13" fill="#0b1220"/><text x="48" y="134" fill="#dbeafe" font-family="SFMono-Regular, Consolas, monospace" font-size="13">{ "mcpServers": {</text><text x="48" y="160" fill="#dbeafe" font-family="SFMono-Regular, Consolas, monospace" font-size="13">  "mcpwp": { "url": ".../mcp" }</text><text x="48" y="186" fill="#dbeafe" font-family="SFMono-Regular, Consolas, monospace" font-size="13">} }</text>
      <rect x="28" y="244" width="146" height="38" rx="10" fill="#2f7cff"/><text x="52" y="269" fill="#fff" font-size="14" font-weight="850">Copy Config</text>
    </g>
  </g>
</svg>
