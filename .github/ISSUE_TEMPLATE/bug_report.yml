name: Bug Report
description: Something is broken
labels: ["bug", "status:ready"]
body:
  - type: input
    id: version
    attributes:
      label: MCPWP version
      placeholder: "2.8.49"
    validations:
      required: true
  - type: input
    id: wp_version
    attributes:
      label: WordPress version
      placeholder: "6.7"
    validations:
      required: true
  - type: input
    id: php_version
    attributes:
      label: PHP version
      placeholder: "8.2"
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: MCP client used
      options:
        - Claude Desktop
        - Claude Code
        - OpenClaw
        - Hermes Agent
        - ChatGPT Custom GPT
        - Cursor / Windsurf
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Connect Claude Desktop\n2. Call wp_onboard\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (WP debug log, browser console)
      render: shell
