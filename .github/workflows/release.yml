name: Release Mumega MCP

on:
  push:
    tags:
      - 'v*'

env:
  PLUGIN_SLUG: mcpwp

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/v}"
          echo "version=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Version: ${TAG_NAME}"

      - name: Verify version in plugin file
        run: |
          PLUGIN_VERSION=$(grep -E "^\s+\* Version:\s+" mcpwp/mcpwp.php | sed -E 's/.*Version:\s+//' | tr -d '[:space:]')
          TAG_VERSION="${{ steps.version.outputs.version }}"

          echo "Plugin file version: ${PLUGIN_VERSION}"
          echo "Tag version: ${TAG_VERSION}"

          if [ "${PLUGIN_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Version mismatch! Plugin file has ${PLUGIN_VERSION} but tag is ${TAG_VERSION}"
            exit 1
          fi

          DEFINE_VERSION=$(grep -E "^define\( 'MCPWP_VERSION'" mcpwp/mcpwp.php | sed -E "s/.*'([0-9.]+)'.*/\1/")
          echo "Define version: ${DEFINE_VERSION}"

          if [ "${DEFINE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Version mismatch! MCPWP_VERSION constant is ${DEFINE_VERSION} but tag is ${TAG_VERSION}"
            exit 1
          fi

      - name: Create WP.org-compatible distribution
        id: create_wporg
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          WPORG_ZIP="mcpwp-${VERSION}-wporg.zip"
          TEMP_DIR="mcpwp-wporg"

          # Copy plugin to temp directory
          cp -r mcpwp "${TEMP_DIR}"

          # Remove pro directory
          rm -rf "${TEMP_DIR}/includes/pro"

          # Remove development files
          rm -rf "${TEMP_DIR}/.git"
          rm -rf "${TEMP_DIR}/.github"
          rm -rf "${TEMP_DIR}/tests"
          rm -rf "${TEMP_DIR}/node_modules"
          rm -rf "${TEMP_DIR}/dist"
          rm -f "${TEMP_DIR}/.gitignore"
          rm -f "${TEMP_DIR}/.distignore"
          rm -f "${TEMP_DIR}/composer.json"
          rm -f "${TEMP_DIR}/composer.lock"
          rm -f "${TEMP_DIR}/package.json"
          rm -f "${TEMP_DIR}/package-lock.json"
          rm -f "${TEMP_DIR}/phpunit.xml"
          rm -f "${TEMP_DIR}/README.md"
          rm -f "${TEMP_DIR}/CONTRIBUTING.md"
          rm -f "${TEMP_DIR}/CHANGELOG.md"

          # Rename directory back to mcpwp for WordPress
          mv "${TEMP_DIR}" mcpwp-temp

          # Create zip
          zip -r "${WPORG_ZIP}" mcpwp-temp
          mv mcpwp-temp/readme.txt . 2>/dev/null || true

          # Clean up
          rm -rf mcpwp-temp

          echo "wporg_zip=${WPORG_ZIP}" >> $GITHUB_OUTPUT
          echo "WP.org-compatible distribution created: ${WPORG_ZIP}"
          ls -lh "${WPORG_ZIP}"

      - name: Create paid/self-hosted distribution
        id: create_paid
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PAID_ZIP="mcpwp-${VERSION}.zip"
          TEMP_DIR="mcpwp-paid"

          # Copy plugin to temp directory
          cp -r mcpwp "${TEMP_DIR}"

          # Remove development files (keep pro)
          rm -rf "${TEMP_DIR}/.git"
          rm -rf "${TEMP_DIR}/.github"
          rm -rf "${TEMP_DIR}/tests"
          rm -rf "${TEMP_DIR}/node_modules"
          rm -rf "${TEMP_DIR}/dist"
          rm -f "${TEMP_DIR}/.gitignore"
          rm -f "${TEMP_DIR}/.distignore"
          rm -f "${TEMP_DIR}/composer.json"
          rm -f "${TEMP_DIR}/composer.lock"
          rm -f "${TEMP_DIR}/package.json"
          rm -f "${TEMP_DIR}/package-lock.json"
          rm -f "${TEMP_DIR}/phpunit.xml"
          rm -f "${TEMP_DIR}/README.md"
          rm -f "${TEMP_DIR}/CONTRIBUTING.md"
          rm -f "${TEMP_DIR}/CHANGELOG.md"

          # Rename directory back to mcpwp for WordPress
          mv "${TEMP_DIR}" mcpwp-temp

          # Create zip
          zip -r "${PAID_ZIP}" mcpwp-temp

          # Clean up
          rm -rf mcpwp-temp

          echo "paid_zip=${PAID_ZIP}" >> $GITHUB_OUTPUT
          echo "Paid/self-hosted distribution created: ${PAID_ZIP}"
          ls -lh "${PAID_ZIP}"

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | head -n 2 | tail -n 1)

          if [ -z "${PREV_TAG}" ]; then
            echo "No previous tag found, using all commits"
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Generating release notes from ${PREV_TAG} to ${GITHUB_REF_NAME}"

          # Create release notes
          cat > release_notes.md << 'EOF'
          ## Mumega MCP v${{ steps.version.outputs.version }}

          ### Changes

          EOF

          # Get commit messages
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s" >> release_notes.md

          # Add download instructions
          cat >> release_notes.md << 'EOF'

          ### Installation

          **WP.org-Compatible Version:**
          - Download `mcpwp-${{ steps.version.outputs.version }}-wporg.zip`
          - Upload to WordPress via Plugins > Add New > Upload
          - Licensed modules are not included

          **Paid/Self-Hosted Version:**
          - Download `mcpwp-${{ steps.version.outputs.version }}.zip`
          - Requires a valid Freemius license or trial for licensed features
          - Includes licensed modules (forms, users, SEO, WooCommerce, etc.)

          ### Requirements

          - WordPress 5.0 or higher
          - PHP 7.4 or higher

          ---

          Generated with [Mumega MCP](https://github.com/Mumega-com/mcp-for-wp)
          EOF

          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mumega MCP v${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          files: |
            ${{ steps.create_wporg.outputs.wporg_zip }}
            ${{ steps.create_paid.outputs.paid_zip }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "### Release Complete! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
          echo "- WP.org-compatible: \`${{ steps.create_wporg.outputs.wporg_zip }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Paid/self-hosted: \`${{ steps.create_paid.outputs.paid_zip }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Release](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
