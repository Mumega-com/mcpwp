name: Release Mumega MCP

on:
  push:
    tags:
      - 'v*'

env:
  PLUGIN_SLUG: site-pilot-ai

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/v}"
          echo "version=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Version: ${TAG_NAME}"

      - name: Verify version in plugin file
        run: |
          PLUGIN_VERSION=$(grep -E "^\s+\* Version:\s+" site-pilot-ai/site-pilot-ai.php | sed -E 's/.*Version:\s+//' | tr -d '[:space:]')
          TAG_VERSION="${{ steps.version.outputs.version }}"

          echo "Plugin file version: ${PLUGIN_VERSION}"
          echo "Tag version: ${TAG_VERSION}"

          if [ "${PLUGIN_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Version mismatch! Plugin file has ${PLUGIN_VERSION} but tag is ${TAG_VERSION}"
            exit 1
          fi

          DEFINE_VERSION=$(grep -E "^define\( 'SPAI_VERSION'" site-pilot-ai/site-pilot-ai.php | sed -E "s/.*'([0-9.]+)'.*/\1/")
          echo "Define version: ${DEFINE_VERSION}"

          if [ "${DEFINE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Version mismatch! SPAI_VERSION constant is ${DEFINE_VERSION} but tag is ${TAG_VERSION}"
            exit 1
          fi

      # Single source of truth: build.sh produces both zips (paid keeps
      # includes/pro/; WP.org strips includes/pro/ and the self-hosted updater)
      # with the correct top-level site-pilot-ai/ folder name.
      - name: Build distribution zips
        id: build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bash build.sh
          PAID_ZIP="site-pilot-ai-${VERSION}.zip"
          WPORG_ZIP="site-pilot-ai-${VERSION}-wporg.zip"
          cp dist/site-pilot-ai.zip "${PAID_ZIP}"
          cp dist/site-pilot-ai-wporg.zip "${WPORG_ZIP}"
          echo "paid_zip=${PAID_ZIP}" >> $GITHUB_OUTPUT
          echo "wporg_zip=${WPORG_ZIP}" >> $GITHUB_OUTPUT
          ls -lh "${PAID_ZIP}" "${WPORG_ZIP}"

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | head -n 2 | tail -n 1)

          if [ -z "${PREV_TAG}" ]; then
            echo "No previous tag found, using all commits"
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Generating release notes from ${PREV_TAG} to ${GITHUB_REF_NAME}"

          # Create release notes
          cat > release_notes.md << 'EOF'
          ## Mumega MCP v${{ steps.version.outputs.version }}

          ### Changes

          EOF

          # Get commit messages
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s" >> release_notes.md

          # Add download instructions
          cat >> release_notes.md << 'EOF'

          ### Installation

          **WP.org-Compatible Version:**
          - Download `site-pilot-ai-${{ steps.version.outputs.version }}-wporg.zip`
          - Upload to WordPress via Plugins > Add New > Upload
          - Licensed modules are not included

          **Paid/Self-Hosted Version:**
          - Download `site-pilot-ai-${{ steps.version.outputs.version }}.zip`
          - Requires a valid Freemius license or trial for licensed features
          - Includes licensed modules (forms, users, SEO, WooCommerce, etc.)

          ### Requirements

          - WordPress 5.0 or higher
          - PHP 7.4 or higher

          ---

          Generated with [Mumega MCP](https://github.com/Mumega-com/mcp-for-wp)
          EOF

          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mumega MCP v${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          files: |
            ${{ steps.build.outputs.wporg_zip }}
            ${{ steps.build.outputs.paid_zip }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # DRAFT (disabled by default): publishes the paid build to Freemius.
      # No-ops unless the FREEMIUS_BEARER_TOKEN repository secret is set, so it
      # cannot publish until you explicitly add the secret. See #324.
      - name: Upload to Freemius (if configured)
        env:
          FREEMIUS_BEARER_TOKEN: ${{ secrets.FREEMIUS_BEARER_TOKEN }}
        run: |
          if [ -z "${FREEMIUS_BEARER_TOKEN}" ]; then
            echo "FREEMIUS_BEARER_TOKEN not set — skipping Freemius upload."
            echo "To enable: add the FREEMIUS_BEARER_TOKEN repository secret."
            exit 0
          fi
          bash scripts/release_freemius.sh --version "${{ steps.version.outputs.version }}" --skip-bump

      # DRAFT (disabled by default): deploys the WP.org build to the plugin SVN.
      # Intentionally a no-op until the plugin slug is confirmed (#321) and a
      # deploy is wired (recommended: 10up/action-wordpress-plugin-deploy). See #325.
      - name: Deploy to WordPress.org SVN (if configured)
        env:
          WPORG_SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          WPORG_SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
        run: |
          if [ -z "${WPORG_SVN_USERNAME}" ] || [ -z "${WPORG_SVN_PASSWORD}" ]; then
            echo "WP.org SVN credentials not set — skipping WordPress.org deploy."
            echo "To enable: add WPORG_SVN_USERNAME and WPORG_SVN_PASSWORD secrets,"
            echo "confirm the WP.org plugin slug (#321), and wire the deploy step."
            exit 0
          fi
          echo "::warning::WP.org SVN deploy is drafted but not yet implemented (no-op)."
          echo "Credentials are present, but the SVN push is intentionally a no-op until the"
          echo "plugin slug is confirmed (#321) and the deploy action is wired (#325)."

      - name: Release summary
        run: |
          echo "### Release Complete! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
          echo "- WP.org-compatible: \`${{ steps.build.outputs.wporg_zip }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Paid/self-hosted: \`${{ steps.build.outputs.paid_zip }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Release](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
