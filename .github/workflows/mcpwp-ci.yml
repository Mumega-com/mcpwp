name: Mumega MCP CI

on:
  pull_request:
    paths:
      - "mcpwp/**"
      - ".github/workflows/mcpwp-ci.yml"
  push:
    branches:
      - main
    paths:
      - "mcpwp/**"
      - ".github/workflows/mcpwp-ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none
          tools: composer:v2

      - name: Install Dev Dependencies
        run: composer install --working-dir mcpwp --no-interaction --prefer-dist

      - name: PHP Syntax Lint
        run: |
          find mcpwp -path 'mcpwp/vendor' -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 php -l

      - name: Unit Tests
        run: mcpwp/vendor/bin/phpunit --configuration mcpwp/tests/phpunit.xml
