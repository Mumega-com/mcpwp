# MCPWP Local Test Rig
# wp-dev     → 127.0.0.1:8086  (plugin bind-mounted, dev + phpunit)
# wp-upgrade → 127.0.0.1:8087  (no mount, real Plugin_Upgrader tests)
# channel    → 127.0.0.1:8088  (local update channel, nginx static files)

services:

  db:
    image: mariadb:lts
    container_name: wp-rig-db
    mem_limit: 512m
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rigroot
      MYSQL_DATABASE: wp_dev
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppass
    command: >
      --innodb-buffer-pool-size=128M
      --innodb-log-file-size=32M
      --max_connections=100
      --skip-name-resolve
    volumes:
      - db-data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - rignet
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  wp-dev:
    image: wordpress:latest
    container_name: wp-rig-wp-dev
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 512m
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wp_dev
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DEBUG: "1"
      WORDPRESS_DEBUG_LOG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_DISPLAY', false);
        define('WP_DEBUG_LOG', true);
        /* Multisite — uncomment these 3 lines + run: docker exec wp-rig-wp-dev wp core multisite-convert --allow-root */
        /* define('WP_ALLOW_MULTISITE', true); */
        /* define('MULTISITE', true); */
        /* define('SUBDOMAIN_INSTALL', false); */
    volumes:
      # Live bind-mount of plugin source (edits are instant, read-only to prevent accidental changes)
      - /mnt/HC_Volume_104325311/projects/sitepilotai/wp-ai-operator/mcpwp:/var/www/html/wp-content/plugins/mcpwp:ro
      - dev-uploads:/var/www/html/wp-content/uploads
    networks:
      - rignet

  wp-upgrade:
    image: wordpress:latest
    container_name: wp-rig-wp-upgrade
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 512m
    restart: unless-stopped
    ports:
      - "127.0.0.1:8087:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wp_upgrade
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DEBUG: "1"
      WORDPRESS_DEBUG_LOG: "1"
    # NO plugin bind-mount — Plugin_Upgrader writes real filesystem
    volumes:
      - upgrade-uploads:/var/www/html/wp-content/uploads
      - upgrade-plugins:/var/www/html/wp-content/plugins
    networks:
      - rignet

  channel:
    image: nginx:alpine
    container_name: wp-rig-channel
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./channel:/srv/channel:ro
      - ./channel/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      rignet:
        aliases:
          - channel
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:80/version.json"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/db
  dev-uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/dev-uploads
  upgrade-uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/upgrade-uploads
  upgrade-plugins:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/upgrade-plugins

networks:
  rignet:
    driver: bridge
